name: Monthly Theme Refresh

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-themes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .cache/cargo-target
          key: ${{ runner.os }}-cargo-${{ hashFiles('scripts/**/*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Refresh themes
        run: npm run build:refresh

      - name: Detect generated changes
        id: changes
        run: |
          if git diff --quiet -- themes; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump extension version
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          node --input-type=module -e "import fs from 'node:fs'; const filePath = 'extension.toml'; const source = fs.readFileSync(filePath, 'utf8'); const match = source.match(/^version = \"(\\d+)\.(\\d+)\.(\\d+)\"$/m); if (!match) throw new Error('Could not find version in extension.toml'); const nextVersion = [match[1], match[2], Number(match[3]) + 1].join('.'); fs.writeFileSync(filePath, source.replace(match[0], `version = \"${nextVersion}\"`));"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: Refresh bundled VSCode themes and bump extension version
          branch: ci/monthly-theme-refresh
          delete-branch: true
          title: Refresh bundled VSCode themes
          body: |
            ## Summary
            - refresh cached upstream repositories
            - rebuild bundled Zed theme files from the latest VSCode defaults
            - bump the extension patch version for the updated release

            ## Notes
            - generated automatically by the monthly GitHub Actions workflow
          add-paths: |
            themes/**
            extension.toml
          labels: |
            automated
