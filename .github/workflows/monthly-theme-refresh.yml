name: Monthly Theme Refresh

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-themes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .cache/cargo-target
          key: ${{ runner.os }}-cargo-${{ hashFiles('scripts/**/*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Refresh themes
        run: npm run build:refresh

      - name: Detect generated changes
        id: changes
        run: |
          if git diff --quiet -- themes; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump extension version
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          current_version=$(grep '^version = "' extension.toml | sed -E 's/^version = "([0-9]+\.[0-9]+\.[0-9]+)"$/\1/')
          if [ -z "$current_version" ]; then
            echo "Could not find version in extension.toml"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current_version"
          next_version="$major.$minor.$((patch + 1))"
          sed -i -E "s/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"$/version = \"$next_version\"/" extension.toml
          echo "Bumped extension version to $next_version"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Refresh bundled VSCode themes and bump extension version
          branch: ci/monthly-theme-refresh
          delete-branch: true
          title: Refresh bundled VSCode themes
          body: |
            ## Summary
            - refresh cached upstream repositories
            - rebuild bundled Zed theme files from the latest VSCode defaults
            - bump the extension patch version for the updated release

            ## Notes
            - generated automatically by the monthly GitHub Actions workflow
          add-paths: |
            themes/**
            extension.toml
          labels: |
            automated

      - name: Report pull request result
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "pull-request-operation=${{ steps.cpr.outputs.pull-request-operation }}"
          echo "pull-request-number=${{ steps.cpr.outputs.pull-request-number }}"
          echo "pull-request-url=${{ steps.cpr.outputs.pull-request-url }}"
